set-option -g default-terminal "tmux-256color"
set-option -ag terminal-overrides ",xterm-256color:RGB"
set-option -g focus-events on

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-option -g mouse on
set-option -g history-limit 100000
set-option -g escape-time 10

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

bind-key e new-window -n editor -c "#{pane_current_path}" "nvim"

set-option -g status on
set-option -g status-interval 5
set-option -g status-position bottom
set-option -g status-style "bg=#161616,fg=#dde1e6"
set-option -g message-style "bg=#262626,fg=#f2f4f8"
set-option -g pane-border-style "fg=#393939"
set-option -g pane-active-border-style "fg=#33b1ff"
set-window-option -g window-status-current-style "bg=#33b1ff,fg=#161616,bold"
set-window-option -g window-status-style "bg=#161616,fg=#dde1e6"

set-option -g status-left-length 40
set-option -g status-left "#[fg=#3ddbd9,bold] #S #[fg=#525252]|"
set-option -g status-right "#[fg=#525252]%Y-%m-%d #[fg=#f2f4f8]%H:%M "
